name: codeql

# Java SAST (Static Application Security Testing — 빌드된 코드를 정적 분석해 취약 패턴 탐지).
# GitHub code scanning 의 Security 탭에 결과가 모인다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 주 1회 baseline 스캔 — push 가 없는 주에도 CodeQL 쿼리팩 갱신분이 돌게.
    - cron: '0 6 * * 1'

# 같은 ref 에 새 푸시가 오면 이전 run 취소 (ci.yml 과 동일 정책).
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze java-kotlin
    runs-on: ubuntu-latest
    permissions:
      # CodeQL 결과 업로드에 필요.
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      # 이 레포는 root 에 settings.gradle 이 없는 독립 Gradle 프로젝트 묶음이라 autobuild 가
      # 빌드 트리를 못 찾는다 — services/* + modules/* 를 각자 wrapper 로 명시 컴파일한다.
      # CodeQL 은 컴파일 산출물을 분석하므로 test 까지는 불필요, classes 만 있으면 된다.
      - name: Build all projects
        run: |
          for project in \
            modules/slow-query-detector \
            modules/jfr-recorder-starter \
            modules/correlation-mdc-starter \
            services/order-service \
            services/payment-service \
            services/inventory-service; do
            echo "::group::compile $project"
            (cd "$project" && ./gradlew classes testClasses --no-daemon)
            echo "::endgroup::"
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
