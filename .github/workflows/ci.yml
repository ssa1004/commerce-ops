name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한 — 기본은 읽기 전용. SARIF 업로드처럼 더 필요한 job 만 job-level 로 승격.
permissions:
  contents: read

# 동시성 — 같은 PR 에 새 푸시가 오면 이전 run 을 즉시 취소 (CI 시간/요금 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # 워크플로/Dockerfile 정적 검사 — actionlint + hadolint.
  # 빌드보다 먼저 깨질 수 있는 값싼 검사를 앞단에 둔다.
  # ----------------------------------------------------------------
  lint:
    name: Lint workflows & Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: actionlint (workflow 문법/표현식/SHA 검사)
        # 공식 액션 대신 동봉 스크립트로 핀-프리 설치 (자체 SHA 핀 불필요).
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
      - name: hadolint (3 service Dockerfiles)
        run: |
          HADOLINT_VERSION=v2.12.0
          curl -fsSL -o hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          chmod +x hadolint
          rc=0
          for svc in order payment inventory; do
            echo "::group::hadolint $svc-service"
            ./hadolint "services/${svc}-service/Dockerfile" || rc=1
            echo "::endgroup::"
          done
          exit $rc

  # ----------------------------------------------------------------
  # Helm chart 검증 — dep build → lint → template | kubeconform.
  # 이전엔 helm 검증이 전혀 없어 chart 가 깨져도 CI 가 통과했다.
  # ----------------------------------------------------------------
  helm-validate:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    env:
      KUBECONFORM_VERSION: v0.6.7
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4
      - name: Install kubeconform
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install kubeconform /usr/local/bin/
      - name: helm dependency build
        run: helm dependency build helm/mini-shop
      - name: helm lint (dev + prod values)
        run: |
          helm lint helm/mini-shop
          helm lint helm/mini-shop -f helm/mini-shop/values-prod.yaml
      - name: helm template | kubeconform (prod, ServiceMonitor on)
        # ServiceMonitor 를 켠 상태로 렌더해 CRD(monitoring.coreos.com/v1) 도 검증.
        # datreeio CRD 카탈로그에서 ServiceMonitor 스키마를 받아 -strict 로 본다.
        run: |
          crd_catalog='https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          helm template t helm/mini-shop -f helm/mini-shop/values-prod.yaml \
            --set order-service.serviceMonitor.enabled=true \
            --set payment-service.serviceMonitor.enabled=true \
            --set inventory-service.serviceMonitor.enabled=true \
          | kubeconform -strict -ignore-missing-schemas -summary \
              -schema-location default \
              -schema-location "$crd_catalog"

  # ----------------------------------------------------------------
  # 공급망 보안 — Trivy 로 IaC(config) 와 의존성(fs) 을 스캔하고 SARIF 를
  # GitHub code scanning 에 올린다. 스캔 자체는 실패시켜도 업로드는 막지 않게
  # (continue-on-error) 분리 — 신규 룰로 빨강이 떠도 결과는 Security 탭에 남는다.
  # ----------------------------------------------------------------
  supply-chain:
    name: Supply-chain scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # SARIF 업로드에 필요.
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy config scan (Dockerfile / compose / helm IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Trivy fs scan (의존성/시크릿)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy config SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        continue-on-error: true
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Upload Trivy fs SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  lint-config:
    name: Validate infra configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate docker-compose
        run: docker compose -f infra/docker-compose.yml config > /dev/null
      - name: Validate Prometheus config
        run: |
          docker run --rm --entrypoint promtool \
            -v "$PWD/infra/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.51.0 \
            check config /etc/prometheus/prometheus.yml
      - name: Validate Alertmanager config
        run: |
          docker run --rm --entrypoint amtool \
            -v "$PWD/infra/alertmanager:/etc/alertmanager:ro" \
            prom/alertmanager:v0.27.0 \
            check-config /etc/alertmanager/config.yml
      # SLO recording / burn-rate 규칙 단위 테스트 — promtool test rules.
      - name: Test Prometheus SLO rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "$PWD/infra/prometheus:/etc/prometheus:ro" \
            -w /etc/prometheus \
            prom/prometheus:v2.51.0 \
            test rules burn-rate-tests.yml

  # 각 서비스 / 모듈은 독립 Gradle 프로젝트 (root 에 settings.gradle 없음). 이전 build job 은
  # 루트의 settings.gradle 을 찾아 없으면 건너뛰는 구조라, Phase 1 이후로도 *아무것도 빌드하지
  # 않은 채* CI 가 초록불을 보였다 — 이 매트릭스가 그 silent skip 을 대체한다.
  #
  # services/* 와 modules/* 가 늘어날 때는 아래 두 매트릭스에 *프로젝트 이름만* 추가하면
  # OK. 각 프로젝트의 build.gradle.kts 가 testcontainers 를 자기 안에서 가져오므로 추가
  # 셋업은 불필요.
  modules:
    name: Build module — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - slow-query-detector
          - jfr-recorder-starter
          - correlation-mdc-starter
          - actuator-extras
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Build & test
        working-directory: modules/${{ matrix.module }}
        run: ./gradlew build --no-daemon
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: test-report-${{ matrix.module }}
          path: modules/${{ matrix.module }}/build/reports/tests/

  services:
    name: Build service — ${{ matrix.service }}
    runs-on: ubuntu-latest
    # services 는 modules (slow-query-detector / jfr-recorder-starter) 를 composite build
    # 로 참조한다 — 즉 modules 가 깨지면 services 도 같이 깨진다. modules job 이 먼저 통과한
    # 다음에 services 를 돌려, 빨강이 났을 때 어디가 원인인지 매트릭스 이름만 봐도 명확.
    needs: modules
    strategy:
      fail-fast: false
      matrix:
        service:
          - order-service
          - payment-service
          - inventory-service
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Build & test
        working-directory: services/${{ matrix.service }}
        # check 는 build 의 부분집합이지만 명시 — 새로운 verification task 가 추가되면
        # build 가 자동 포함하지 않을 수 있음.
        run: ./gradlew build check --no-daemon
      - name: Coverage report (Kover)
        working-directory: services/${{ matrix.service }}
        # koverLog 는 test 실행 결과를 재사용해 라인 커버리지 % 를 CI 로그에 찍고,
        # koverXml/Html 은 PR 검토용 아티팩트. test 가 이미 위에서 돌았으므로 incremental.
        run: ./gradlew koverLog koverXmlReport koverHtmlReport --no-daemon
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/kover/
          if-no-files-found: ignore
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: test-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/tests/
