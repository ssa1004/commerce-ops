# Dependabot — 의존성 / GitHub Actions 업데이트 PR 자동 생성.
#
# 이 레포는 root 에 settings.gradle 이 없는 *독립 Gradle 프로젝트 묶음* 이다 (services/* 3개 +
# modules/* 4개, 각자 자기 wrapper). Dependabot 의 gradle ecosystem 은 한 directory 당 하나의
# 빌드 트리만 본다 — 그래서 빌드 가능한 프로젝트마다 directory 항목을 따로 둔다. 설계 단계
# 모듈 (chaos-injector) 은 build.gradle.kts 가 없어 제외 — 정식 구현 시 추가.
#
# CI YAML 매트릭스와 동일한 원칙: services/* · modules/* 가 늘면 여기에 directory 만 추가.
#
# 알림 정책: 모든 항목 monthly + open-pull-requests-limit 5 + groups 로 한 ecosystem/directory 의
# 업데이트를 PR 하나로 묶는다. 매주 쏟아지던 개별 PR/리뷰 알림을 월 1회 묶음 PR 로 줄이는 게 목적.
version: 2
updates:
  # --- GitHub Actions (.github/workflows/*) — 레포 전체에 하나 ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    # 모든 actions 업데이트를 월 1회 묶음 PR 하나로.
    groups:
      github-actions-all:
        patterns: ["*"]
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # --- Gradle: modules/* (자체 Spring Boot 운영 라이브러리) ---
  - package-ecosystem: gradle
    directory: /modules/slow-query-detector
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-slow-query-detector-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  - package-ecosystem: gradle
    directory: /modules/jfr-recorder-starter
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-jfr-recorder-starter-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  - package-ecosystem: gradle
    directory: /modules/correlation-mdc-starter
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-correlation-mdc-starter-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  - package-ecosystem: gradle
    directory: /modules/actuator-extras
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-actuator-extras-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  # --- Gradle: services/* (order / payment / inventory) ---
  - package-ecosystem: gradle
    directory: /services/order-service
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-order-service-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  - package-ecosystem: gradle
    directory: /services/payment-service
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-payment-service-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  - package-ecosystem: gradle
    directory: /services/inventory-service
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-inventory-service-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - gradle

  # --- Docker: services/* Dockerfile 의 base image (eclipse-temurin) 갱신 ---
  # 각 Dockerfile 이 자기 디렉터리에 있으므로 directory 를 서비스별로 따로 둔다.
  # FROM eclipse-temurin:21-jdk / 21-jre 의 새 패치 태그가 나오면 PR 을 연다.
  - package-ecosystem: docker
    directory: /services/order-service
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      docker-order-service-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /services/payment-service
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      docker-payment-service-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /services/inventory-service
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      docker-inventory-service-all:
        patterns: ["*"]
    commit-message:
      prefix: build
    labels:
      - dependencies
      - docker
