{{/*
Secret — chart 가 직접 만드는 placeholder. 운영은 secret.create=false + extraEnvFrom 로
ExternalSecret / SealedSecret 결과를 참조하는 게 정석.
*/}}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "order-service.secretName" . }}
  labels:
    {{- include "order-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.global.postgres.password | quote }}
{{- end }}
