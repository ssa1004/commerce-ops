spring:
  application:
    name: order-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      # auto-commit=false 명시. 기본도 false 이지만 *명시* 하지 않으면 spring-kafka 버전 업그레이드
      # 시 default 가 바뀔 위험 + 사고 후 회고에서 "이 컨슈머는 진짜 manual commit 인가" 를 확인할
      # 단일 신호. ADR-021 참조.
      enable-auto-commit: false
      properties:
        # cooperative-sticky assignor — Kafka 2.4+ 의 incremental rebalance. 기본 (range / sticky)
        # 은 stop-the-world — rebalance 동안 *모든 consumer 가 자기 partition 을 일단 다 놓고* 다시
        # 받는다. 인스턴스 1개 추가/제거에도 전체가 잠깐 멈춤. cooperative 는 *변경된 partition 만*
        # revoke + assign — 정상 인스턴스의 처리는 끊기지 않음.
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
        # session.timeout / heartbeat 의 trade-off:
        #  - 짧으면 죽은 인스턴스 회수 빠름 (rebalance 빨리 시작) + GC pause / temp 네트워크 끊김에
        #    오탐 (불필요한 rebalance) 위험.
        #  - 길면 오탐 줄지만 진짜 죽은 인스턴스의 partition 이 회수될 때까지 메시지 적체.
        # session=30s, heartbeat=10s (1/3 규칙) — 현재 운영 표준.
        session.timeout.ms: ${KAFKA_SESSION_TIMEOUT_MS:30000}
        heartbeat.interval.ms: ${KAFKA_HEARTBEAT_INTERVAL_MS:10000}
        # max.poll.interval=5분 — 한 poll 처리에 가장 오래 걸릴 수 있는 시간. 이 시간을 넘기면
        # 컨슈머 그룹은 그 인스턴스를 *죽었다고 판단* 해 강제 rebalance. 우리 listener 는 inbox 저장
        # 이 빠르지만 (~10ms), DB 일시 정지나 GC pause 도 견디려면 5분이 안전.
        max.poll.interval.ms: ${KAFKA_MAX_POLL_INTERVAL_MS:300000}
        # max.poll.records=50 — 한 poll 에 받는 레코드 수. 너무 크면 처리 시간이 길어져
        # max.poll.interval 위반 위험, 너무 작으면 throughput 떨어짐. 50 은 *처리당 ~10ms × 50 =
        # 500ms* 라 5분 한도와 600x 마진.
        max.poll.records: ${KAFKA_MAX_POLL_RECORDS:50}
    listener:
      # MANUAL_IMMEDIATE: listener 메서드가 Acknowledgment.acknowledge() 를 명시 호출할 때만
      # offset commit. 트랜잭션 commit *직후* ack 호출 → 트랜잭션이 롤백되면 ack 도 안 일어나
      # Kafka 가 같은 메시지를 다시 보낸다 (at-least-once + 트랜잭션 정합).
      # 기존 ack-mode=record 는 *listener 메서드 return 직후* 자동 ack — 메서드가 트랜잭션 안에서
      # 돌면 트랜잭션 commit 전이라도 ack 가 나갈 수 있어 (커밋 실패 시 메시지 누락 가능)
      # 위험 (Spring Kafka 의 timing 에 따라 다름). MANUAL_IMMEDIATE 가 더 *명시적*.
      ack-mode: MANUAL_IMMEDIATE
      # rebalance 시점에 진행 중 처리는 *완료 + ack* 까지 기다리고 새 partition 으로 넘어감.
      # ConsumerAwareRebalanceListener 가 onPartitionsRevokedBeforeCommit 에서 동기 commit 보장.
      # 자세한 구현은 io.minishop.order.kafka.OrderConsumerRebalanceListener 참조.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orderdb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
    # HikariCP 명시 튜닝 — Spring Boot 의 default 는 데모/개발 기준 (max=10) 이라 운영에서는
    # 서비스의 실 RPS / 평균 트랜잭션 길이로 산정해야 한다. 단순히 큰 값이 좋은 게 아님 —
    # DB 의 max_connections 와 곱해지므로 *모든 인스턴스 합 ≤ DB max_connections × 0.7* 가 상한.
    # 산정: 평균 트랜잭션 ~50ms, 목표 RPS ~300 → Little's law 동시성 = 15. 여유 + Outbox poller / SAGA
    # 흐름의 *2번째 connection* (트랜잭션 안에서 Kafka template 발행은 connection 별도 안 잡지만,
    # 멀티 인스턴스 간 경합 흡수 마진 5) → 20.
    # ADR-020 참조.
    hikari:
      pool-name: orderHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      # connection-timeout: 3s — 풀이 가득 찼을 때 *얼마나 기다릴지*. 너무 길면 호출자가 timeout
      # 까지 thread 점유. 너무 짧으면 일시적 spike 에 503 이 빈발. p99 트랜잭션이 ~200ms 인 환경에선
      # 3s 는 "10번 안에 한 connection 은 비어야 정상" 의 안전선.
      connection-timeout: ${DB_CONN_TIMEOUT_MS:3000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:2000}
      # max-lifetime: 29분 — pgbouncer / postgres 의 idle 종료보다 짧게. DB 측에서 connection 을
      # 끊으면 hikari 가 그 사실을 모르고 broken connection 을 빌려줘 다음 SQL 이 이상하게 실패.
      # AWS RDS Proxy / pgbouncer 의 default 는 30분이므로 1분 마진.
      max-lifetime: ${DB_MAX_LIFETIME_MS:1740000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      # leak-detection-threshold: 30s — connection 을 30초 넘게 들고 있으면 stack trace 로그.
      # try-with-resources 누락, 외부 @Transactional 안에서 connection 직접 close 안 함, async
      # task 가 connection 을 전파받고 안 돌려줌 — 이런 *흔한 사고* 가 즉시 보인다.
      # 운영 트랜잭션이 10s 를 넘는 일은 거의 없어 30s 는 false positive 가 적은 보수값.
      leak-detection-threshold: ${DB_LEAK_DETECTION_MS:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, jfr
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# OpenTelemetry — auto-instrumentation으로 traces + logs를 OTLP로 내보냄.
# 메트릭은 Prometheus(/actuator/prometheus)로 노출하므로 OTel 메트릭 export는 끔 (이중화 방지).
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://${OTEL_HOST:localhost}:4318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: otlp
  traces:
    exporter: otlp
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:dev}
  instrumentation:
    micrometer:
      enabled: false   # Micrometer ↔ OTel bridge 끔 (이미 Prometheus로 노출 중)
    logback-appender:
      experimental-log-attributes: true

app:
  # OrderSAGA 의 Spring StateMachine 모델 — 기존 동기 if/else 흐름과 *병행* (shadow) 으로 진행해
  # 두 결정이 일치하는지 메트릭으로 비교. enforce=true 로 두면 mismatch 시 즉시 예외 (CI / staging
  # 검증용). 운영은 shadow 로 두고 mismatch 알람을 모니터링. ADR-019 참조.
  saga:
    machine:
      enforce: ${SAGA_MACHINE_ENFORCE:false}

mini-shop:
  payment:
    url: ${PAYMENT_URL:http://localhost:8082}
    connect-timeout-ms: ${PAYMENT_CONNECT_TIMEOUT_MS:1000}
    # PG 호출이 약간 느릴 수 있으니 5s 정도 여유
    read-timeout-ms: ${PAYMENT_READ_TIMEOUT_MS:5000}
  inventory:
    url: ${INVENTORY_URL:http://localhost:8083}
    connect-timeout-ms: ${INVENTORY_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${INVENTORY_READ_TIMEOUT_MS:3000}
  outbox:
    poller:
      enabled: ${OUTBOX_POLLER_ENABLED:true}
      interval-ms: ${OUTBOX_POLLER_INTERVAL_MS:1000}
      batch-size: ${OUTBOX_POLLER_BATCH_SIZE:100}
      max-attempts: ${OUTBOX_POLLER_MAX_ATTEMPTS:5}
      send-timeout-ms: ${OUTBOX_POLLER_SEND_TIMEOUT_MS:5000}
  reconciliation:
    enabled: ${RECONCILIATION_ENABLED:true}
    interval-ms: ${RECONCILIATION_INTERVAL_MS:60000}
    lookback-minutes: ${RECONCILIATION_LOOKBACK_MIN:30}
    batch-size: ${RECONCILIATION_BATCH_SIZE:200}
  # adaptive concurrency limiter — payment / inventory 호출에 적용. backend 가 느려지면
  # latency 측정 (Gradient2 — TCP Vegas 영감) 으로 동시 진행 한도를 자동 축소해 cascade 차단.
  # 한도 초과 시 LimitExceededException → 503 + Retry-After 1s.
  concurrency:
    enabled: ${CLIENT_CONCURRENCY_ENABLED:true}
    initial-limit: ${CLIENT_CONCURRENCY_INITIAL:20}
    min-limit: ${CLIENT_CONCURRENCY_MIN:1}
    max-limit: ${CLIENT_CONCURRENCY_MAX:100}
  # HTTP client retry — transient 오류 (network blip, 일시 5xx) 에 exponential backoff + jitter
  # 로 재시도. 단순 retry 는 thundering herd 위험 — backend 가 일시 장애로 모든 호출자를 거절했을
  # 때 retry 가 *같은 시점에* 몰리면 backend 회복이 더 느려짐. jitter 가 시간을 분산해 차단.
  # ADR-022 참조.
  retry:
    enabled: ${CLIENT_RETRY_ENABLED:true}
    max-attempts: ${CLIENT_RETRY_MAX_ATTEMPTS:3}
    base-delay-ms: ${CLIENT_RETRY_BASE_DELAY_MS:200}
    max-delay-ms: ${CLIENT_RETRY_MAX_DELAY_MS:2000}
    multiplier: ${CLIENT_RETRY_MULTIPLIER:2.0}
    jitter-factor: ${CLIENT_RETRY_JITTER:0.5}
    retry-on-5xx: ${CLIENT_RETRY_5XX:true}
  # JFR continuous profiling — 사고 발생 후 *그 시점* 의 프로파일을 분석하기 위해 24/7 켜둔다.
  jfr:
    enabled: ${JFR_ENABLED:true}
    rollover: ${JFR_ROLLOVER:5m}
    max-retained: ${JFR_MAX_RETAINED:24}
    dump-directory: ${JFR_DUMP_DIR:/tmp/jfr}
    settings: ${JFR_SETTINGS:default}
    mask-sensitive-events: ${JFR_MASK_SENSITIVE:false}
    # JFR chunk 의 원격 사본 (S3 호환 스토리지). 컨테이너가 죽거나 노드가 빠져도 사후 분석이
    # 가능하도록. 기본 disable — dev 환경 진입장벽 유지. 운영은 IAM role + endpoint=S3 로,
    # 로컬 데모는 minio + 정적 키로.
    upload:
      enabled: ${JFR_UPLOAD_ENABLED:false}
      backend: ${JFR_UPLOAD_BACKEND:s3}
      bucket: ${JFR_UPLOAD_BUCKET:minishop-jfr}
      region: ${JFR_UPLOAD_REGION:us-east-1}
      endpoint: ${JFR_UPLOAD_ENDPOINT:}
      key-prefix: ${JFR_UPLOAD_PREFIX:minishop/dev}
      pod-id: ${JFR_UPLOAD_POD_ID:}    # blank → HOSTNAME 환경변수
      access-key: ${JFR_UPLOAD_ACCESS_KEY:}   # blank → DefaultCredentialsProvider (IAM role)
      secret-key: ${JFR_UPLOAD_SECRET_KEY:}
      upload-ad-hoc-dumps: ${JFR_UPLOAD_AD_HOC:false}

# 로그 패턴/appender는 src/main/resources/logback-spring.xml에서 정의.
