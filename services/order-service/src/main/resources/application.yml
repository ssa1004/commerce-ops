spring:
  application:
    name: order-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orderdb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, jfr
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# OpenTelemetry — auto-instrumentation으로 traces + logs를 OTLP로 내보냄.
# 메트릭은 Prometheus(/actuator/prometheus)로 노출하므로 OTel 메트릭 export는 끔 (이중화 방지).
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://${OTEL_HOST:localhost}:4318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: otlp
  traces:
    exporter: otlp
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:dev}
  instrumentation:
    micrometer:
      enabled: false   # Micrometer ↔ OTel bridge 끔 (이미 Prometheus로 노출 중)
    logback-appender:
      experimental-log-attributes: true

app:
  # OrderSAGA 의 Spring StateMachine 모델 — 기존 동기 if/else 흐름과 *병행* (shadow) 으로 진행해
  # 두 결정이 일치하는지 메트릭으로 비교. enforce=true 로 두면 mismatch 시 즉시 예외 (CI / staging
  # 검증용). 운영은 shadow 로 두고 mismatch 알람을 모니터링. ADR-019 참조.
  saga:
    machine:
      enforce: ${SAGA_MACHINE_ENFORCE:false}

mini-shop:
  payment:
    url: ${PAYMENT_URL:http://localhost:8082}
    connect-timeout-ms: ${PAYMENT_CONNECT_TIMEOUT_MS:1000}
    # PG 호출이 약간 느릴 수 있으니 5s 정도 여유
    read-timeout-ms: ${PAYMENT_READ_TIMEOUT_MS:5000}
  inventory:
    url: ${INVENTORY_URL:http://localhost:8083}
    connect-timeout-ms: ${INVENTORY_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${INVENTORY_READ_TIMEOUT_MS:3000}
  outbox:
    poller:
      enabled: ${OUTBOX_POLLER_ENABLED:true}
      interval-ms: ${OUTBOX_POLLER_INTERVAL_MS:1000}
      batch-size: ${OUTBOX_POLLER_BATCH_SIZE:100}
      max-attempts: ${OUTBOX_POLLER_MAX_ATTEMPTS:5}
      send-timeout-ms: ${OUTBOX_POLLER_SEND_TIMEOUT_MS:5000}
  reconciliation:
    enabled: ${RECONCILIATION_ENABLED:true}
    interval-ms: ${RECONCILIATION_INTERVAL_MS:60000}
    lookback-minutes: ${RECONCILIATION_LOOKBACK_MIN:30}
    batch-size: ${RECONCILIATION_BATCH_SIZE:200}
  # adaptive concurrency limiter — payment / inventory 호출에 적용. backend 가 느려지면
  # latency 측정 (Gradient2 — TCP Vegas 영감) 으로 동시 진행 한도를 자동 축소해 cascade 차단.
  # 한도 초과 시 LimitExceededException → 503 + Retry-After 1s.
  concurrency:
    enabled: ${CLIENT_CONCURRENCY_ENABLED:true}
    initial-limit: ${CLIENT_CONCURRENCY_INITIAL:20}
    min-limit: ${CLIENT_CONCURRENCY_MIN:1}
    max-limit: ${CLIENT_CONCURRENCY_MAX:100}
  # JFR continuous profiling — 사고 발생 후 *그 시점* 의 프로파일을 분석하기 위해 24/7 켜둔다.
  jfr:
    enabled: ${JFR_ENABLED:true}
    rollover: ${JFR_ROLLOVER:5m}
    max-retained: ${JFR_MAX_RETAINED:24}
    dump-directory: ${JFR_DUMP_DIR:/tmp/jfr}
    settings: ${JFR_SETTINGS:default}
    mask-sensitive-events: ${JFR_MASK_SENSITIVE:false}
    # JFR chunk 의 원격 사본 (S3 호환 스토리지). 컨테이너가 죽거나 노드가 빠져도 사후 분석이
    # 가능하도록. 기본 disable — dev 환경 진입장벽 유지. 운영은 IAM role + endpoint=S3 로,
    # 로컬 데모는 minio + 정적 키로.
    upload:
      enabled: ${JFR_UPLOAD_ENABLED:false}
      backend: ${JFR_UPLOAD_BACKEND:s3}
      bucket: ${JFR_UPLOAD_BUCKET:minishop-jfr}
      region: ${JFR_UPLOAD_REGION:us-east-1}
      endpoint: ${JFR_UPLOAD_ENDPOINT:}
      key-prefix: ${JFR_UPLOAD_PREFIX:minishop/dev}
      pod-id: ${JFR_UPLOAD_POD_ID:}    # blank → HOSTNAME 환경변수
      access-key: ${JFR_UPLOAD_ACCESS_KEY:}   # blank → DefaultCredentialsProvider (IAM role)
      secret-key: ${JFR_UPLOAD_SECRET_KEY:}
      upload-ad-hoc-dumps: ${JFR_UPLOAD_AD_HOC:false}

# 로그 패턴/appender는 src/main/resources/logback-spring.xml에서 정의.
