spring:
  application:
    name: order-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orderdb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# OpenTelemetry — auto-instrumentation으로 traces + logs를 OTLP로 내보냄.
# 메트릭은 Prometheus(/actuator/prometheus)로 노출하므로 OTel 메트릭 export는 끔 (이중화 방지).
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://${OTEL_HOST:localhost}:4318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: otlp
  traces:
    exporter: otlp
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:dev}
  instrumentation:
    micrometer:
      enabled: false   # Micrometer ↔ OTel bridge 끔 (이미 Prometheus로 노출 중)
    logback-appender:
      experimental-log-attributes: true

mini-shop:
  payment:
    url: ${PAYMENT_URL:http://localhost:8082}
    connect-timeout-ms: ${PAYMENT_CONNECT_TIMEOUT_MS:1000}
    # PG 호출이 약간 느릴 수 있으니 5s 정도 여유
    read-timeout-ms: ${PAYMENT_READ_TIMEOUT_MS:5000}
  inventory:
    url: ${INVENTORY_URL:http://localhost:8083}
    connect-timeout-ms: ${INVENTORY_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${INVENTORY_READ_TIMEOUT_MS:3000}
  outbox:
    poller:
      enabled: ${OUTBOX_POLLER_ENABLED:true}
      interval-ms: ${OUTBOX_POLLER_INTERVAL_MS:1000}
      batch-size: ${OUTBOX_POLLER_BATCH_SIZE:100}
      max-attempts: ${OUTBOX_POLLER_MAX_ATTEMPTS:5}
  reconciliation:
    enabled: ${RECONCILIATION_ENABLED:true}
    interval-ms: ${RECONCILIATION_INTERVAL_MS:60000}
    lookback-minutes: ${RECONCILIATION_LOOKBACK_MIN:30}
    batch-size: ${RECONCILIATION_BATCH_SIZE:200}

# 로그 패턴/appender는 src/main/resources/logback-spring.xml에서 정의.
