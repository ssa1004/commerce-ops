spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orderdb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

mini-shop:
  payment:
    url: ${PAYMENT_URL:http://localhost:8082}
    connect-timeout-ms: ${PAYMENT_CONNECT_TIMEOUT_MS:1000}
    # PG 호출이 약간 느릴 수 있으니 5s 정도 여유
    read-timeout-ms: ${PAYMENT_READ_TIMEOUT_MS:5000}
  inventory:
    url: ${INVENTORY_URL:http://localhost:8083}
    connect-timeout-ms: ${INVENTORY_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${INVENTORY_READ_TIMEOUT_MS:3000}

logging:
  pattern:
    # Phase 2에서 correlation-mdc-starter가 traceId/spanId를 자동 주입
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
