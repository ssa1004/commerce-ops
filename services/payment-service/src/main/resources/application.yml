spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/paymentdb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

mini-shop:
  pg:
    # Phase 1에서는 자기 자신의 mock-pg endpoint를 호출.
    # Phase 4 이후 외부 mock 서비스로 분리 가능.
    url: ${PG_URL:http://localhost:${SERVER_PORT:8082}/mock-pg/charge}
    connect-timeout-ms: ${PG_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${PG_READ_TIMEOUT_MS:5000}
  mock-pg:
    enabled: ${MOCK_PG_ENABLED:true}
    latency-mean-ms: ${MOCK_PG_LATENCY_MEAN_MS:200}
    latency-stddev-ms: ${MOCK_PG_LATENCY_STDDEV_MS:50}
    failure-rate: ${MOCK_PG_FAILURE_RATE:0.01}
    timeout-rate: ${MOCK_PG_TIMEOUT_RATE:0.005}
    timeout-ms: ${MOCK_PG_TIMEOUT_MS:30000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
