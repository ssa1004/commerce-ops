spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/paymentdb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
    # HikariCP 명시 튜닝 — Spring Boot default 는 데모 기준이라 운영에서는 명시. payment 는 PG 호출
    # 동안 트랜잭션을 *유지* 한다 (in-doubt 윈도우의 일반적 형태) — 평균 트랜잭션 길이 ~250ms 로
    # 가장 길다. 목표 RPS ~50 → Little's law = 12.5, 여유 마진을 트랜잭션 시간이 아닌 *connection 점유
    # 시간 변동* 에 둔다 (PG 가 일시 느려져도 견디게) → 12.
    # ADR-020 참조.
    hikari:
      pool-name: paymentHikariPool
      maximum-pool-size: ${DB_POOL_MAX:12}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      # connection-timeout: 2s — 풀이 가득 찼을 때 대기 한도. PG 호출 자체가 read-timeout 5s 라
      # 호출자 timeout 보다 짧게 잡아 *DB 풀에서* 대기하다 결제 timeout 이 동시에 터지는 시나리오를
      # 분리. 짧으면 풀 saturation 이 *DB 503* 으로 빠르게 표면화.
      connection-timeout: ${DB_CONN_TIMEOUT_MS:2000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:2000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1740000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      # leak-detection-threshold: 20s — payment 는 PG 호출 도중 connection 을 들고 있으니 더 짧게.
      # 정상 트랜잭션은 ~250ms 내 끝나며, 20s 가 걸리면 PG 가 망가졌거나 try-finally 누락 의심.
      leak-detection-threshold: ${DB_LEAK_DETECTION_MS:20000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://${OTEL_HOST:localhost}:4318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: otlp
  traces:
    exporter: otlp
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:dev}
  instrumentation:
    micrometer:
      enabled: false
    logback-appender:
      experimental-log-attributes: true

mini-shop:
  pg:
    # Phase 1에서는 자기 자신의 mock-pg endpoint를 호출.
    # Phase 4 이후 외부 mock 서비스로 분리 가능.
    url: ${PG_URL:http://localhost:${SERVER_PORT:8082}/mock-pg/charge}
    connect-timeout-ms: ${PG_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${PG_READ_TIMEOUT_MS:5000}
  mock-pg:
    enabled: ${MOCK_PG_ENABLED:true}
    latency-mean-ms: ${MOCK_PG_LATENCY_MEAN_MS:200}
    latency-stddev-ms: ${MOCK_PG_LATENCY_STDDEV_MS:50}
    failure-rate: ${MOCK_PG_FAILURE_RATE:0.01}
    timeout-rate: ${MOCK_PG_TIMEOUT_RATE:0.005}
    timeout-ms: ${MOCK_PG_TIMEOUT_MS:30000}

# 로그 패턴/appender는 src/main/resources/logback-spring.xml에서 정의.
