spring:
  application:
    name: inventory-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/inventorydb
    username: ${DB_USER:mini}
    password: ${DB_PASSWORD:mini}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://${OTEL_HOST:localhost}:4318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: otlp
  traces:
    exporter: otlp
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:dev}
  instrumentation:
    micrometer:
      enabled: false
    logback-appender:
      experimental-log-attributes: true

mini-shop:
  inventory:
    lock:
      key-prefix: ${INVENTORY_LOCK_KEY_PREFIX:inv}
      wait-millis: ${INVENTORY_LOCK_WAIT_MS:2000}
      lease-millis: ${INVENTORY_LOCK_LEASE_MS:10000}

# 로그 패턴/appender는 src/main/resources/logback-spring.xml에서 정의.
