groups:
  - name: mini-shop.latency-and-errors
    interval: 30s
    rules:
      - alert: order_p99_latency_high
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, uri) (rate(http_server_requests_seconds_bucket{application="order-service"}[5m]))
          ) > 0.5
        for: 5m
        labels:
          severity: P2
          service: order-service
        annotations:
          summary: "order-service p99 latency > 500ms (uri={{ $labels.uri }})"
          description: |
            5분간 p99 응답시간이 500ms를 초과. SLO(p99 < 500ms) 위반.
            Tempo로 가서 같은 시간대 trace를 점프해 어느 span이 비대해졌는지 확인할 것.
          runbook_url: https://github.com/ssa1004/mini-shop-observability/blob/main/docs/runbook/order-p99-latency-high.md

      - alert: order_error_rate_spike
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="order-service",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{application="order-service"}[5m])), 0.001)
          ) > 0.01
        for: 5m
        labels:
          severity: P1
          service: order-service
        annotations:
          summary: "order-service 5xx 비율이 1%를 초과"
          description: |
            4xx(409 OUT_OF_STOCK / 402 PAYMENT_DECLINED 등)는 비즈니스 결과라 카운트하지 않음.
            5xx만 카운트. 502/503은 의존 서비스(inventory/payment) 장애를 강하게 시사.
          runbook_url: https://github.com/ssa1004/mini-shop-observability/blob/main/docs/runbook/order-error-rate-spike.md

  - name: mini-shop.runtime-saturation
    interval: 30s
    rules:
      - alert: hikari_pool_saturation
        expr: |
          (
            sum by (application, pool) (hikaricp_connections_active)
            /
            clamp_min(sum by (application, pool) (hikaricp_connections_max), 1)
          ) > 0.9
        for: 3m
        labels:
          severity: P2
        annotations:
          summary: "HikariCP active/max > 90% ({{ $labels.application }}/{{ $labels.pool }})"
          description: |
            DB 커넥션 풀이 한계에 가까움. 외부 호출이 트랜잭션 안에 있는지, 슬로우 쿼리/락 대기 중인지 확인.
            대시보드: JVM + HTTP > Hikari 패널. trace로 어떤 요청이 커넥션을 오래 쥐는지 추적.
          runbook_url: https://github.com/ssa1004/mini-shop-observability/blob/main/docs/runbook/hikari-pool-saturation.md

      - alert: jvm_gc_pause_too_long
        expr: |
          (
            rate(jvm_gc_pause_seconds_sum[5m])
            /
            clamp_min(rate(jvm_gc_pause_seconds_count[5m]), 0.001)
          ) > 0.2
        for: 5m
        labels:
          severity: P2
        annotations:
          summary: "{{ $labels.application }} 평균 GC pause > 200ms"
          description: |
            Old Gen 압박 또는 Humongous allocation 의심.
            JFR/async-profiler로 할당 핫스팟 확인. 단기적으론 -Xmx 상향, 장기적으론 메모리 누수 후보 분석.
          runbook_url: https://github.com/ssa1004/mini-shop-observability/blob/main/docs/runbook/gc-pause-too-long.md

  - name: mini-shop.business
    interval: 30s
    rules:
      - alert: inventory_lock_timeout_high
        expr: |
          (
            sum(rate(inventory_lock_acquire_seconds_count{outcome="timeout"}[5m]))
            /
            clamp_min(sum(rate(inventory_lock_acquire_seconds_count[5m])), 0.001)
          ) > 0.01
        for: 3m
        labels:
          severity: P2
          service: inventory-service
        annotations:
          summary: "inventory 분산락 timeout 비율 > 1%"
          description: |
            Hot product에 대한 contention 또는 락 lease가 너무 짧을 가능성.
            대상 productId가 어떤 것인지(`/inventories/{id}` 추세), 락 wait/lease 설정 점검.
          runbook_url: https://github.com/ssa1004/mini-shop-observability/blob/main/docs/runbook/inventory-lock-timeout-high.md

      - alert: n_plus_one_detected
        expr: |
          sum by (application) (increase(n_plus_one_total[5m])) > 0
        for: 5m
        labels:
          severity: P2
        annotations:
          summary: "{{ $labels.application }}에서 N+1 패턴 감지"
          description: |
            slow-query-detector 모듈이 같은 정규화 SQL이 임계 횟수 반복되는 패턴을 감지함.
            로그에서 "Suspected N+1 (...)" 메시지의 stack trace로 어느 호출자가 만들었는지 식별 → @EntityGraph / fetch join으로 수정.
          runbook_url: https://github.com/ssa1004/mini-shop-observability/blob/main/docs/runbook/n-plus-one-detected.md
