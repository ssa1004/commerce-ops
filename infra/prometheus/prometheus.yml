global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # k6 remote-write 시 default label 로 환경 식별. cross-env 비교가 쉬워진다.
  external_labels:
    cluster: commerce-ops-local

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Remote-write receiver 는 docker-compose 의 `--web.enable-remote-write-receiver`
# (또는 `--enable-feature=otlp-write-receiver`) 로 켠다. Helm chart 도 동일 플래그.
# k6 의 `--out experimental-prometheus-rw=http://prometheus:9090/api/v1/write`
# (또는 host 측에서 `http://localhost:9090/api/v1/write`) 가 이 receiver 로 들어와
# `portfolio-load.json` 대시보드의 k6_* 메트릭으로 plot 된다.
#
# k6 publish 시 default label 은 다음과 같다 (override 가능):
#   - testid          — k6 가 자동으로 부여하거나 `--tag testid=...` 로 명시
#   - service / scenario — 본 portfolio 에서는 각 service 의 run-load.sh 가
#                         `K6_PROMETHEUS_RW_PUSH_INTERVAL` / `K6_PROMETHEUS_RW_TREND_STATS`
#                         + `--tag service=auth-service --tag scenario=token-issue` 형태로 부여.
# 대시보드는 `service` / `scenario` 변수를 통해 필터링한다.

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: order-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: payment-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          application: inventory-service

  # OTel Collector self-metrics — tail_sampling 의 policy 별 sampled/not_sampled 카운트와
  # processor refused/dropped span 수 등을 노출. tail_sampling 도입 후 "정말로 error 가
  # 100% 보존되는지", "trace buffer 가 num_traces 한도에 닿아 drop 이 나는지" 같은 보조
  # 신호를 여기서 본다.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          application: otel-collector
