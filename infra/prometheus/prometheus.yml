global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: order-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: payment-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          application: inventory-service

  # OTel Collector self-metrics — tail_sampling 의 policy 별 sampled/not_sampled 카운트와
  # processor refused/dropped span 수 등을 노출. tail_sampling 도입 후 "정말로 error 가
  # 100% 보존되는지", "trace buffer 가 num_traces 한도에 닿아 drop 이 나는지" 같은 보조
  # 신호를 여기서 본다.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          application: otel-collector
