# auth-stub nginx — JWK Set 과 OIDC discovery 만 정적 JSON 으로 노출.
# 통합 데모에서 sister repo 의 service 들이 JWT 검증을 시연할 수 있는 *최소* IdP 표면.

server {
    listen       9000;
    server_name  auth-stub;

    # CORS (sister repo 의 SPA 가 직접 fetch 할 수도 있으니 데모 환경에선 넓게 열어둔다)
    add_header Access-Control-Allow-Origin  "*"  always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Max-Age       "300" always;

    # JWK Set — application/json 으로 명시 (Spring resource server 가 Content-Type 을 본다)
    location = /.well-known/jwks.json {
        default_type application/json;
        alias /usr/share/nginx/auth-stub/jwks.json;
        add_header Cache-Control "public, max-age=300" always;
    }

    # OIDC discovery — issuer / jwks_uri 만
    location = /.well-known/openid-configuration {
        default_type application/json;
        alias /usr/share/nginx/auth-stub/openid-configuration.json;
        add_header Cache-Control "public, max-age=300" always;
    }

    # health — compose healthcheck 용
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # 그 외는 404 (token / authorization 같은 진짜 endpoint 를 요청하면 — stub 의 한계 명시)
    location / {
        default_type application/json;
        return 404 '{"error":"not_implemented","message":"auth-stub serves JWK Set / OIDC discovery only — see infra/auth-stub/README.md"}';
    }
}
